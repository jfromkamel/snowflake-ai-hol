name: ENERGY_CONSUMPTION_MODEL
tables:
  - name: ENERGY_METERS
    base_table:
      database: INDUSTRIAL_HOL_DB
      schema: ENERGY
      table: ENERGY_METERS
    dimensions:
      - name: meter_id
        expr: METER_ID
        data_type: NUMBER
      - name: facility_id
        expr: FACILITY_ID
        data_type: NUMBER
      - name: meter_name
        expr: METER_NAME
        data_type: VARCHAR
      - name: energy_type
        expr: ENERGY_TYPE
        data_type: VARCHAR
        description: Type of energy measured (Electric, Natural Gas)
      - name: month
        expr: MONTH
        data_type: VARCHAR
        description: Billing month in YYYY-MM format
    measures:
      - name: total_budgeted_kwh
        expr: SUM(BUDGETED_KWH)
        data_type: NUMBER
        description: Total budgeted energy consumption in kWh
      - name: total_actual_kwh
        expr: SUM(ACTUAL_KWH)
        data_type: NUMBER
        description: Total actual energy consumption in kWh
      - name: total_energy_cost
        expr: SUM(TOTAL_COST)
        data_type: NUMBER
        description: Total energy cost in dollars
      - name: avg_cost_per_kwh
        expr: AVG(COST_PER_KWH)
        data_type: NUMBER
        description: Average cost per kilowatt-hour
      - name: max_peak_demand
        expr: MAX(PEAK_DEMAND_KW)
        data_type: NUMBER
        description: Maximum peak demand in kilowatts
      - name: budget_variance_pct
        expr: AVG((ACTUAL_KWH - BUDGETED_KWH) * 100.0 / NULLIF(BUDGETED_KWH, 0))
        data_type: NUMBER
        description: Average percentage over or under energy budget
      - name: over_budget_count
        expr: "COUNT(CASE WHEN ACTUAL_KWH > BUDGETED_KWH * 1.2 THEN 1 END)"
        data_type: NUMBER
        description: Number of meter readings more than 20% over budget
  - name: FACILITIES
    base_table:
      database: INDUSTRIAL_HOL_DB
      schema: OPERATIONS
      table: FACILITIES
    dimensions:
      - name: facility_id
        expr: FACILITY_ID
        data_type: NUMBER
      - name: facility_name
        expr: FACILITY_NAME
        data_type: VARCHAR
      - name: location
        expr: LOCATION
        data_type: VARCHAR
      - name: facility_type
        expr: FACILITY_TYPE
        data_type: VARCHAR
      - name: square_footage
        expr: SQUARE_FOOTAGE
        data_type: NUMBER
relationships:
  - left_table: ENERGY_METERS
    right_table: FACILITIES
    join_type: LEFT
    relationship_columns:
      - left_column: FACILITY_ID
        right_column: FACILITY_ID
custom_filters:
  - name: high_energy_variance
    expr: ACTUAL_KWH > BUDGETED_KWH * 1.2
    description: Meter readings where actual consumption exceeds budget by more than 20%
  - name: electric_only
    expr: ENERGY_TYPE = 'Electric'
    description: Filter to electric meters only
verified_queries:
  - question: Which facilities are over their energy budget?
    sql: SELECT f.FACILITY_NAME, e.MONTH, e.BUDGETED_KWH, e.ACTUAL_KWH, ROUND((e.ACTUAL_KWH - e.BUDGETED_KWH) * 100.0 / e.BUDGETED_KWH, 1) AS VARIANCE_PCT, e.TOTAL_COST FROM INDUSTRIAL_HOL_DB.ENERGY.ENERGY_METERS e JOIN INDUSTRIAL_HOL_DB.OPERATIONS.FACILITIES f ON e.FACILITY_ID = f.FACILITY_ID WHERE e.ACTUAL_KWH > e.BUDGETED_KWH ORDER BY VARIANCE_PCT DESC
  - question: What is the total energy cost by facility this year?
    sql: SELECT f.FACILITY_NAME, SUM(e.TOTAL_COST) AS TOTAL_COST, SUM(e.ACTUAL_KWH) AS TOTAL_KWH FROM INDUSTRIAL_HOL_DB.ENERGY.ENERGY_METERS e JOIN INDUSTRIAL_HOL_DB.OPERATIONS.FACILITIES f ON e.FACILITY_ID = f.FACILITY_ID GROUP BY f.FACILITY_NAME ORDER BY TOTAL_COST DESC
